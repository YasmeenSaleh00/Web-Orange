<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Even or Odd Number</title>
  </head>
  <body>
    <script>
      let x = Number(prompt("Enter Number to check if Even ir Odd"));
      if (x % 2 === 0) {
        alert(`The number ${x} Even`);
      } else {
        alert(`The number ${x} Odd`);
      }
    </script>
  </body>
</html>
