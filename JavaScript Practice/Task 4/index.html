<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Condition</title>
  </head>
  <body>
    <script>
      let x = Number(prompt("Enter the first num"));
      let y = Number(prompt("Enter the second num"));
      if (x > y) {
        console.log("Hello World");
        document.write("Hello World");
        alert("Hello World");
      }else{
           console.log("Goodbye");
        document.write("Goodbye");
        alert("Goodbye");
      }
    </script>
  </body>
</html>
