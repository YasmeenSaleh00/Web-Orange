<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 2</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style1.css" />
   
  </head>
  <body>
    <div class="container">
      <h3>Linked <i class="fa-brands fa-linkedin"></i></h3>
      <div>
        <form action="#" class="main">
          <h2>Sign in</h2>
          <p class="first">Stay updated on your professional word</p>
          <div><input type="text" placeholder="Email or Phone" name="email" /></div>

          <div class="input">
            <input type="password" placeholder=" Password" name="password" />
            <span class="show-btn">Show</span>
          </div>

          <p class="forget">Forgot password?</p>
          <button type="submit" class="fbtn">Sign in</button>
          <p id="or">or</p>
          <button type="submit" class="sbtn">
            <i class="fa-brands fa-lg fa-apple"></i> Sign in with Apple
          </button>
        </form>
        <p class="p">
          New to LinkedIn?
          <span style="color: #0966c2; font-weight: bold">Join Now</span>
        </p>
      </div>
      <div class="footer">
        <div class="footer-content">
          <span class="footer-logo"
            >Linked <i class="fa-brands fa-linkedin"></i>
            <span style="color: #00000099">&copy; 2021</span>
          </span>
          <a href="#">User Agreement</a>
          <a href="#">Privacy Policy</a>
          <a href="#">Community Guidelines</a>
          <a href="#">Cookie Policy</a>
          <a href="#">Copyright Policy</a>
          <a href="#">Send Feedback</a>
          <a href="#">Language <i class="fa-solid fa-chevron-down"></i></a>
        </div>
      </div>
    </div>
  </body>
</html>
