<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task5</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
        font-family: "Montserrat", sans-serif;
      }
      .containar {
        background-color: #ffffff;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 60px auto 60px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #031234;
        color: white;
        max-height: 60px;
        grid-column: span 2;
        padding: 20px;
      }
      .brand {
        color: #f44336;
        font-size: 15px;
        margin-left: 10px;
      }
      .logo-box {
        font-weight: bold;
        transform: rotateZ(90deg);
        position: absolute;

        left: 0;
      }
      .nav-links ul {
        display: flex;
        flex-direction: row;
        align-items: center;
        list-style-type: none;
        gap: 10px;
      }
      .nav-links ul li a {
        text-decoration: none;
        color: #ffffff;
        font-size: 12px;
      }
      .nav-links ul li a:hover {
        color: #f44336;
        text-decoration: underline;
      }

      .main {
        grid-column: span 2;
      }
      .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 80px;
        padding: 50px 0;
      }

      .box h1 {
        text-align: center;
        margin-top: 20px;

        color: #031234;
        font-weight: 800;
      }
      .box p {
        text-align: center;
      }
      form {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        width: 100%;
        max-width: 600px;
      }
      .input {
        display: flex;
        flex-direction: column;
        gap: 10px;
        justify-content: center;
        align-items: center;
        padding: 20px;
        width: 100%;
        max-width: 600px;
      }
      input {
        padding: 10px 20px;
        max-width: 600px;
        border: 1px solid #888888;
        width: 500px;
      }

      .footer {
        background-color: #efe0ca;
        grid-column: span 2;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #031234;
        font-weight: bold;
      }
      .footer p {
        margin-top: 10px;
        margin-bottom: 10px;
      }
      .footer a {
        color: #031234;
        text-decoration: none;
        cursor: pointer;
        font-weight: normal;
        font-size: 15px;
        margin-bottom: 10px;
      }
      label {
        font-size: 11px;
        align-self: start;
      }
      .end-content a {
        color: #031234;
        text-decoration: none;
        font-weight: bold;
        font-size: 13px;
      }
      @media screen and (max-width: 768px) {
        .bars-icon {
          display: block !important;
        }
        input {
          width: 350px;
        }
        .nav-links {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="containar">
      <div class="header">
        <div class="header-left">
          <div class="logo-box">DSE</div>
          <div class="brand">DOLLAR SHAVE CLUB</div>
        </div>

        <div class="nav-links">
          <ul>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Original Content</a></li>
            <li><a href="#">Gift</a></li>
            <li><a href="#">Account</a></li>
            <li>
              <a href="#"><i class="fa-solid fa-cart-arrow-down"></i> </a>
            </li>
          </ul>
        </div>
        <div style="display: none" class="bars-icon">
          <i class="fa-solid fa-bars"></i>
        </div>
      </div>
      <div class="main">
        <div class="main-content">
          <div class="box">
            <h1>Contact Us</h1>
            <p>Question not answered yet? We are here to help!</p>
          </div>

          <div class="form">
            <form action="">
              <div class="input">
                <label>HOW CAN WE HELP YOU TODAY? *</label>
                <input type="text" />
              </div>
            </form>
          </div>
          <div class="end-content">
            <a href="#">Partnerships and Media Inquiries</a>
          </div>
        </div>
      </div>
      <div class="footer">
        <p>Questions not answered ?</p>
        <a href="#">Contact us</a>
      </div>
    </div>
  </body>
</html>
