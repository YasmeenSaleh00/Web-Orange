<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 5</title>
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .containar {
        background-color: #3499dd;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 15px;
        min-height: 100vh;
       
      }
      .main {
        background-color: #ffffff;
        padding: 40px;
        box-shadow: 0px 1px 1px 3px #ffffff;
        width: 450px;
      }
      .main h1 {
        margin-bottom: 10px;
        font-weight: bold;
        text-align: left;
        color: #333333;
      }
      .main p {
        color: #888888;
      }
      .info {
        margin-bottom: 20px;
        position: relative;
      }
      .info::before {
        content: "";
        position: absolute;
        width: calc(100% + 80px);
        background-color: #8888885c;
        height: 1px;
        bottom: -10px;
        left: -40px;
      }
      .main form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        
      }
      .full-width {
        grid-column: span 2;
      }
      input{
        background-color: #f2f2f2;
        color: #888888;
      }
      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        outline: none;
        font-size: 15px;
        border: none;
        
      }
      input:focus {
        border: 2px solid #e3e3ff;
      }

      .check {
        grid-column: span 2;
        font-size: 13px;
        margin: 10px 0;
        text-align: left;
        text-transform: capitalize;
        color: #888888;
        

      }
    
      .blue{
        color: #3499dd;
        cursor: pointer;
      }
      .signup-btn {
        grid-column: span 1;
        background-color: #3499dd;
        border: none;
        outline: none;
        
        cursor: pointer;
        color: #ffffff;
        font-size: 20px;
        padding: 10px 20px;
        border-radius: 5px;
        font-weight: bold;
       
      }
      .signup-btn:hover {
        background-color: #166296;
      }
      .footer-links{
        color: #ffffff;
      }
      .footer-links a{
        color: #ffffff;
      }
      @media screen and (max-width: 768px){
        .main{
                 width: 90%;
        }

       .input1,
      .input2{
        grid-column: span 2 !important;
      }
      }
   
    </style>
  </head>
  <body>
    <div class="containar">
      <div class="main">
        <div class="info">
          <h1>sign up</h1>
          <p>Please fill in this form to create an account!</p>
        </div>

        <form action="">
          <div class="input1">
            <input type="text" placeholder="First Name" name="fname" />
          </div>
          <div class="input2">
            <input type="text" placeholder="Last Name" name="lname" />
          </div>
          <div class="full-width">
            <input type="email" placeholder="Email" name="email" />
          </div>
          <div class="full-width">
            <input type="password" placeholder="Password" name="password" />
          </div>
          <div class="full-width">
            <input
              type="password"
              placeholder="Confirm Password"
              name="cpassword"
            />
          </div>
          <div class="check">
            <input type="checkbox" name="terms" />
            <label
              >I accept the <span class="blue">Terms of use</span> &
              <span class="blue">privacy policy</span>
            </label>
          </div>
          <button type="submit" class="signup-btn">Sign up</button>
        </form>
       
      </div>
       <div class="footer-links">
          <p>Already have an account?<a href="#">Login here </a></p>
        </div>
    </div>
  </body>
</html>
