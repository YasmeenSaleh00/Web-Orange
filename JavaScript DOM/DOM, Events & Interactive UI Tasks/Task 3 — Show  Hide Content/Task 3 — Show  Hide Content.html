<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .head{
            background-color: #ececec;
            border: 1px solid black;
            padding: 10px;
            width: 250px;
            font-weight: bold;
            margin-right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        a{
            font-weight: normal;
            font-size: 12px;
        }
        .card{
            width: 250px;
           background-color: #ffffff;
              border: 1px solid black;
              padding: 10px;
              color: #443f3f;
              display: none;
        }
       .active{
        display: block;
       }
       

    </style>
</head>
<body>
    <h3 class="head">
        What is Lorem ?
        <a class="show" href="#">Show</a>
    </h3>
    <div class="card">
        <p>Why do we use it?</p>
        <div class="description">
            Lorem ipsum dolor, sit amet consectetur adipisicing elit. Omnis placeat voluptates
             enim voluptatum impedit amet dolores aperiam quidem 
             corrupti aliquam aut, eos consequatur, porro ab vitae sapiente! Omnis, et. Quaerat.
             <a class="hide" href="#">Hide</a>
        </div>
    </div>
      <h3 class="head">
        Where does it come from ?
        <a class="show" href="#" >Show</a>
    </h3>
    <script>
let showBtn = document.querySelectorAll(".show");
let card = document.getElementsByTagName("div")[0]
showBtn.forEach(e=>{
    e.addEventListener("click",function(e){
        
card.classList.add("active");
})
})
let hideBtn=document.querySelectorAll(".hide");
hideBtn.forEach(e=>{
    e.addEventListener("click",function(element){
card.classList.remove("active")
})
})
    </script>
</body>
</html>
