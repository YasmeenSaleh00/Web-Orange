<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 1 — Basic Form Handling</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        background-color: #efeef1;
      }
      .forminfo {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin-top: 50px;
      }
      #form {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 40px;
        justify-content: center;
      }
      #form div {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #form input {
        padding: 8px;
        background-color: #fefefe;
        border-radius: 5px;
        border: 1px solid #ccc;
      }
      label {
        font-weight: bold;
        color: #444;
        flex: 1;
        text-align: left;
      }
      #form .btn {
        margin-top: 10px;
        display: flex;
        justify-content: center;
      }
      #form div button {
        background-color: #1b78cf;
        color: white;
        border: none;
        cursor: pointer;
        width: 60%;
        text-align: center;
        padding: 10px;
      }
      .data {
        margin-top: 20px;
      text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="forminfo">
      <h2>Basic Info Form</h2>
      <form action="#" id="form">
        <div>
          <label for="fName">First Name:</label>
          <input
            type="text"
            id="fName"
            placeholder="Enter your first name"
            required
          />
        </div>

        <div>
          <label for="lName">Last Name:</label>
          <input
            type="text"
            id="lName"
            placeholder="Enter your last name"
            required
          />
        </div>
        <div>
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="btn">
          <button type="submit" id="btn">Submit</button>
        </div>
      </form>

      <div class="data">
        <h3>Submitted Data:</h3>
        <p>First Name: <span id="res-fName"></span></p>
        <p>Last Name: <span id="res-lName"></span></p>
        <p>Email: <span id="res-email"></span></p>
      </div>
    </div>

    <script>
      let form = document.getElementById("form");
      let btn = document.getElementById("btn");

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        let fName = document.getElementById("fName").value;
        let lName = document.getElementById("lName").value;
        let email = document.getElementById("email").value;
        document.getElementById("res-fName").textContent = fName;
        document.getElementById("res-lName").textContent = lName;
        document.getElementById("res-email").textContent = email;
      });
    </script>
  </body>
</html>
