<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 2 — Basic Validation</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        background-color: #efeef1;
      }
      .forminfo {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin-top: 50px;
      }
      #form {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 40px;
        justify-content: center;
      }
      #form div {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #form input {
        padding: 8px;
        background-color: #fefefe;
        border-radius: 5px;
        border: 1px solid #ccc;
      }
      label {
        font-weight: bold;
        color: #444;
        flex: 1;
        text-align: left;
      }
      #form .btn {
        margin-top: 10px;
        display: flex;
        justify-content: center;
      }
      #form div button {
        background-color: #1b78cf;
        color: white;
        border: none;
        cursor: pointer;
        width: 60%;
        text-align: center;
        padding: 10px;
      }
      .data {
        margin-top: 20px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="forminfo">
      <h2>Basic Info Form</h2>
      <form action="#" id="form">
        <div>
          <label for="fName">First Name:</label>

          <input type="text" id="fName" placeholder="Enter your first name" />
          <span id="fNameError"></span>
        </div>

        <div>
          <label for="lName">Last Name:</label>
          <input type="text" id="lName" placeholder="Enter your last name" />
          <span id="lNameError"></span>
        </div>
        <div>
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="Enter your email" />
          <span id="emailError"></span>
        </div>

        <div class="btn">
          <button type="submit" id="btn" >Submit</button>
        </div>
      </form>

      <div class="data">
        <h3>Submitted Data:</h3>
        <p>First Name: <span id="res-fName"></span></p>
        <p>Last Name: <span id="res-lName"></span></p>
        <p>Email: <span id="res-email"></span></p>
      </div>
    </div>

    <script>
      let form = document.getElementById("form");
      let btn = document.getElementById("btn");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        let fName = document.getElementById("fName");
        let lName = document.getElementById("lName");
        let email = document.getElementById("email");
        let fNameError = document.getElementById("fNameError");
        let lNameError = document.getElementById("lNameError");
        let emailError = document.getElementById("emailError");
        fNameError.textContent = "";
        lNameError.textContent = "";
        emailError.textContent = "";

        let isValid = true;
        const pattern = /[a-z]/i;
        if (fName.value === "") {
          fNameError.textContent = "This field is required";
          fNameError.style.color = "red";
          isValid = false;
        } else if (!pattern.test(fName.value)) {
          fNameError.textContent = "Please use letters only";
          fNameError.style.color = "orange";
          isValid = false;
        }
        if (lName.value === "") {
          lNameError.textContent = "This field is required";
          lNameError.style.color = "red";
          isValid = false;
        } else if (!pattern.test(lName.value)) {
          lNameError.textContent = "Please use letters only";
          lNameError.style.color = "orange";
          isValid = false;
        }
        if (email.value === "") {
          emailError.textContent = "This field is required";
          emailError.style.color = "red";
          isValid = false;
        }
        if (isValid) {
          document.getElementById("res-fName").textContent = fName.value;
          document.getElementById("res-lName").textContent = lName.value;
          document.getElementById("res-email").textContent = email.value;
          form.reset();
        }
      });
    </script>
  </body>
</html>
