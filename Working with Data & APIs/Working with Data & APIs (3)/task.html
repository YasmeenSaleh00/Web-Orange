<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Working with Data & APIs (3)</title>
    <style>
      .card {
        border: 1px solid black;
        padding: 10px;
        width: 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius: 10px;
        background-color: #dddddd81;
        font-family: Arial, Helvetica, sans-serif;
        text-transform: capitalize;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <div id="users" style="display: flex; flex-wrap: wrap; gap: 10px"></div>
    <script>
      const container = document.getElementById("users");

      fetch("https://api.github.com/users")
        .then((res) => res.json())
        .then((users) => {
          users.forEach((user) => {
            const card = `
        <div class="card">
          <img src="${user.avatar_url}" width="50" />
          <p>${user.login}</p>
        </div>
      `;
            container.innerHTML += card;
          });
        });
    </script>
  </body>
</html>
